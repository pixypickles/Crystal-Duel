<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#061225">
<title>Crystal Lane Battle</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <div id="hud">
    <div class="hp"><span>YOU</span><div class="bar"><i id="pHp"></i></div><b id="pHpText">30</b></div>
    <button id="restart">↻</button>
    <div class="hp enemy"><b id="eHpText">30</b><div class="bar"><i id="eHp"></i></div><span>AI</span></div>
  </div>

  <div id="stageWrap">
    <canvas id="game" width="1280" height="720"></canvas>
    <div id="overlay" class="show">
      <div class="card">
        <h1>CRYSTAL LANE BATTLE</h1>
        <p>1人プレイ・相手はAI</p>
        <button id="start">スタート</button>
      </div>
    </div>
    <div id="result">
      <div class="card"><h2 id="resultTitle"></h2><button id="again">もう一度</button></div>
    </div>
  </div>

  <div id="controls">
    <div class="move">
      <button data-action="up">▲</button>
      <button data-action="down">▼</button>
    </div>
    <div class="actions">
      <button data-action="a"><b>A</b><small>低速 5/8</small></button>
      <button data-action="b"><b>B</b><small>中速 4/7</small></button>
      <button data-action="c"><b>C</b><small>高速 3/6</small></button>
      <button data-action="guard" class="guard"><b>G</b><small>ガード</small></button>
    </div>
  </div>
</div>
<script src="game.js"></script>
</body>
</html>
